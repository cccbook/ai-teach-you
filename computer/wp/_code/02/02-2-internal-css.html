<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>內部 CSS 範例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .highlight {
            background-color: yellow;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>內部 CSS 範例</h1>
    <p>這是一個使用內部 CSS 樣式的網頁。</p>
    <p class="highlight">這個段落有黃色背景。</p>
    <p>另一個一般段落。</p>
</body>
</html>
