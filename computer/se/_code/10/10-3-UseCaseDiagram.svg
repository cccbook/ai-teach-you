<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f8f9fa"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold">Use Case Diagram</text>
  
  <!-- Actors -->
  <circle cx="80" cy="100" r="25" fill="#3498db"/>
  <text x="80" y="105" text-anchor="middle" fill="white" font-size="11">User</text>
  
  <circle cx="80" cy="200" r="25" fill="#e74c3c"/>
  <text x="80" y="205" text-anchor="middle" fill="white" font-size="11">Admin</text>
  
  <!-- Use Cases -->
  <ellipse cx="350" cy="80" rx="80" ry="30" fill="#2ecc71"/>
  <text x="350" y="85" text-anchor="middle" fill="white" font-size="11">Login</text>
  
  <ellipse cx="350" cy="140" rx="80" ry="30" fill="#2ecc71"/>
  <text x="350" y="145" text-anchor="middle" fill="white" font-size="11">View Products</text>
  
  <ellipse cx="350" cy="200" rx="80" ry="30" fill="#2ecc71"/>
  <text x="350" y="205" text-anchor="middle" fill="white" font-size="11">Place Order</text>
  
  <ellipse cx="350" cy="260" rx="80" ry="30" fill="#9b59b6"/>
  <text x="350" y="265" text-anchor="middle" fill="white" font-size="11">Manage Products</text>
  
  <!-- Lines -->
  <line x1="105" y1="100" x2="270" y2="80" stroke="#666" stroke-width="1"/>
  <line x1="105" y1="100" x2="270" y2="140" stroke="#666" stroke-width="1"/>
  <line x1="105" y1="100" x2="270" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="105" y1="200" x2="270" y2="260" stroke="#666" stroke-width="1"/>
</svg>
