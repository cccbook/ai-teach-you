<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>列表範例</title>
</head>
<body>
    <h1>列表範例</h1>
    
    <h2>無序列表</h2>
    <ul>
        <li>項目 1</li>
        <li>項目 2</li>
        <li>項目 3</li>
    </ul>
    
    <h2>有序列表</h2>
    <ol>
        <li>第一個步驟</li>
        <li>第二個步驟</li>
        <li>第三個步驟</li>
    </ol>
    
    <h2>巢狀列表</h2>
    <ul>
        <li>主要項目 1
            <ul>
                <li>子項目 1.1</li>
                <li>子項目 1.2</li>
            </ul>
        </li>
        <li>主要項目 2
            <ul>
                <li>子項目 2.1</li>
                <li>子項目 2.2</li>
            </ul>
        </li>
    </ul>
    
    <h2>定義列表</h2>
    <dl>
        <dt>HTML</dt>
        <dd>超文字標記語言，用於建立網頁</dd>
        <dt>CSS</dt>
        <dd>層疊樣式表，用於設計網頁外觀</dd>
    </dl>
</body>
</html>
