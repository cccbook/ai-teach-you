<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>圖片標籤範例</title>
</head>
<body>
    <h1>圖片範例</h1>
    
    <h2>基本圖片</h2>
    <img src="https://via.placeholder.com/300x200" alt="範例圖片">
    
    <h2>指定尺寸</h2>
    <img src="https://via.placeholder.com/150x100" alt="小圖片" width="150" height="100">
    
    <h2>響應式圖片</h2>
    <img src="https://via.placeholder.com/600x400" alt="響應式圖片" style="max-width: 100%; height: auto;">
    
    <h2>圖片與說明</h2>
    <figure>
        <img src="https://via.placeholder.com/400x300" alt="示意圖">
        <figcaption>這是圖片的說明文字</figcaption>
    </figure>
</body>
</html>
