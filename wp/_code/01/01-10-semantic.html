<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>語義化標籤範例</title>
    <style>
        header, nav, main, article, section, aside, footer { padding: 10px; margin: 5px; }
        header { background: #f0f0f0; }
        nav { background: #e0e0e0; }
        main { background: #fff; }
        aside { background: #f9f9f9; }
        footer { background: #333; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>網站標題</h1>
        <p>網站副標題</p>
    </header>
    
    <nav>
        <a href="#home">首頁</a> |
        <a href="#about">關於</a> |
        <a href="#services">服務</a> |
        <a href="#contact">聯絡</a>
    </nav>
    
    <main>
        <article>
            <header>
                <h2>文章標題</h2>
                <p>發佈日期：2026-03-24</p>
            </header>
            <p>文章的主要內容...</p>
            <section>
                <h3>第一節</h3>
                <p>第一節的內容...</p>
            </section>
            <section>
                <h3>第二節</h3>
                <p>第二節的內容...</p>
            </section>
            <footer>
                <p>作者：王小明</p>
            </footer>
        </article>
        
        <aside>
            <h3>側邊欄</h3>
            <ul>
                <li>相關文章 1</li>
                <li>相關文章 2</li>
                <li>相關文章 3</li>
            </ul>
        </aside>
    </main>
    
    <footer>
        <p>&copy; 2026 我的網站. All rights reserved.</p>
    </footer>
</body>
</html>
