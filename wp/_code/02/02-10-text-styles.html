<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>文字樣式範例</title>
    <style>
        .font-family {
            font-family: Arial, sans-serif;
        }
        
        .font-size {
            font-size: 24px;
        }
        
        .font-weight {
            font-weight: bold;
        }
        
        .font-style {
            font-style: italic;
        }
        
        .text-color {
            color: #0066cc;
        }
        
        .text-align {
            text-align: center;
        }
        
        .text-decoration {
            text-decoration: underline;
        }
        
        .text-transform {
            text-transform: uppercase;
        }
        
        .line-height {
            line-height: 2;
        }
        
        .letter-spacing {
            letter-spacing: 3px;
        }
        
        .word-spacing {
            word-spacing: 10px;
        }
        
        .text-shadow {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .white-space {
            white-space: pre-wrap;
        }
        
        .text-overflow {
            width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>文字樣式範例</h1>
    
    <p class="font-family">字體家族: Arial</p>
    <p class="font-size">字體大小: 24px</p>
    <p class="font-weight">字體粗細: bold</p>
    <p class="font-style">字體樣式: italic</p>
    <p class="text-color">文字顏色</p>
    <p class="text-align">文字對齊: 置中</p>
    <p class="text-decoration">文字裝飾: 底線</p>
    <p class="text-transform">文字轉換: uppercase</p>
    <p class="line-height">行高: 2<br>這是第二行</p>
    <p class="letter-spacing">字間距: 3px</p>
    <p class="word-spacing">單字間距: 10px</p>
    <p class="text-shadow">文字陰影</p>
    <p class="white-space">保留空白
        和換行</p>
    <p class="text-overflow">這是一個很長的文字，會被省略...</p>
</body>
</html>
