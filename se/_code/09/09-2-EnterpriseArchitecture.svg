<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">Enterprise AI Agent Architecture</text>
  
  <!-- Clients -->
  <rect x="50" y="80" width="100" height="60" rx="5" fill="#4a90d9"/>
  <text x="100" y="115" text-anchor="middle" fill="white" font-size="12">Web</text>
  
  <rect x="170" y="80" width="100" height="60" rx="5" fill="#4a90d9"/>
  <text x="220" y="115" text-anchor="middle" fill="white" font-size="12">Mobile</text>
  
  <rect x="290" y="80" width="100" height="60" rx="5" fill="#4a90d9"/>
  <text x="340" y="115" text-anchor="middle" fill="white" font-size="12">LINE Bot</text>
  
  <!-- API Gateway -->
  <rect x="280" y="180" width="120" height="50" rx="5" fill="#2ecc71"/>
  <text x="340" y="210" text-anchor="middle" fill="white" font-size="12">API Gateway</text>
  
  <!-- Agent Layer -->
  <rect x="80" y="280" width="100" height="50" rx="5" fill="#e74c3c"/>
  <text x="130" y="310" text-anchor="middle" fill="white" font-size="11">Intent Router</text>
  
  <rect x="220" y="280" width="100" height="50" rx="5" fill="#e74c3c"/>
  <text x="270" y="310" text-anchor="middle" fill="white" font-size="11">Dialog Manager</text>
  
  <rect x="360" y="280" width="100" height="50" rx="5" fill="#e74c3c"/>
  <text x="410" y="310" text-anchor="middle" fill="white" font-size="11">LLM Agent</text>
  
  <!-- Backend Services -->
  <rect x="80" y="400" width="100" height="50" rx="5" fill="#9b59b6"/>
  <text x="130" y="430" text-anchor="middle" fill="white" font-size="11">Knowledge Base</text>
  
  <rect x="220" y="400" width="100" height="50" rx="5" fill="#9b59b6"/>
  <text x="270" y="430" text-anchor="middle" fill="white" font-size="11">CRM System</text>
  
  <rect x="360" y="400" width="100" height="50" rx="5" fill="#9b59b6"/>
  <text x="410" y="430" text-anchor="middle" fill="white" font-size="11">Ticket System</text>
  
  <!-- Arrows -->
  <line x1="100" y1="140" x2="340" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="220" y1="140" x2="340" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="340" y1="140" x2="340" y2="180" stroke="#666" stroke-width="1"/>
  
  <line x1="340" y1="230" x2="130" y2="280" stroke="#666" stroke-width="1"/>
  <line x1="340" y1="230" x2="270" y2="280" stroke="#666" stroke-width="1"/>
  <line x1="340" y1="230" x2="410" y2="280" stroke="#666" stroke-width="1"/>
  
  <line x1="130" y1="330" x2="130" y2="400" stroke="#666" stroke-width="1"/>
  <line x1="270" y1="330" x2="270" y2="400" stroke="#666" stroke-width="1"/>
  <line x1="410" y1="330" x2="410" y2="400" stroke="#666" stroke-width="1"/>
  
  <!-- Database -->
  <ellipse cx="650" cy="450" rx="60" ry="30" fill="#f39c12"/>
  <text x="650" y="455" text-anchor="middle" fill="white" font-size="11">Database</text>
  <line x1="410" y1="430" x2="600" y2="450" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
</svg>
