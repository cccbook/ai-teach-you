<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#f8f9fa"/>
  <text x="300" y="20" text-anchor="middle" font-size="14" font-weight="bold">User Journey Map</text>
  
  <!-- Stages -->
  <rect x="20" y="40" width="100" height="240" fill="#3498db" rx="5"/>
  <text x="70" y="80" text-anchor="middle" fill="white" font-size="12" font-weight="bold">發現</text>
  <text x="70" y="130" text-anchor="middle" fill="white" font-size="10">看到廣告</text>
  <text x="70" y="180" text-anchor="middle" fill="white" font-size="10">社群推薦</text>
  
  <rect x="140" y="40" width="100" height="240" fill="#e67e22" rx="5"/>
  <text x="190" y="80" text-anchor="middle" fill="white" font-size="12" font-weight="bold">考慮</text>
  <text x="190" y="130" text-anchor="middle" fill="white" font-size="10">比較產品</text>
  <text x="190" y="180" text-anchor="middle" fill="white" font-size="10">閱讀評論</text>
  
  <rect x="260" y="40" width="100" height="240" fill="#2ecc71" rx="5"/>
  <text x="310" y="80" text-anchor="middle" fill="white" font-size="12" font-weight="bold">購買</text>
  <text x="310" y="130" text-anchor="middle" fill="white" font-size="10">註冊帳號</text>
  <text x="310" y="180" text-anchor="middle" fill="white" font-size="10">完成購買</text>
  
  <rect x="380" y="40" width="100" height="240" fill="#9b59b6" rx="5"/>
  <text x="430" y="80" text-anchor="middle" fill="white" font-size="12" font-weight="bold">使用</text>
  <text x="430" y="130" text-anchor="middle" fill="white" font-size="10">探索功能</text>
  <text x="430" y="180" text-anchor="middle" fill="white" font-size="10">日常使用</text>
  
  <rect x="500" y="40" width="80" height="240" fill="#e74c3c" rx="5"/>
  <text x="540" y="80" text-anchor="middle" fill="white" font-size="12" font-weight="bold">推薦</text>
  <text x="540" y="130" text-anchor="middle" fill="white" font-size="10">分享心得</text>
  
  <!-- Emotions -->
  <text x="70" y="260" text-anchor="middle" font-size="10">😐</text>
  <text x="190" y="260" text-anchor="middle" font-size="10">🤔</text>
  <text x="310" y="260" text-anchor="middle" font-size="10">😊</text>
  <text x="430" y="260" text-anchor="middle" font-size="10">😄</text>
  <text x="540" y="260" text-anchor="middle" font-size="10">😍</text>
</svg>
